<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="dash-overlay"></div>

  <div class="dash-layout">
    <aside class="dash-sidebar">
      <div class="dash-sidebar-logo">
        <a href="index.html">KK</a>
      </div>
      <nav class="dash-nav">
        <a href="#" data-section="section-profile" class="active">&#128100; Profile</a>
        <a href="#" data-section="section-projects">&#128188; Projects</a>
        <a href="#" data-section="section-data">&#128230; Data</a>
      </nav>
      <div class="dash-sidebar-footer">
        <button class="theme-toggle" id="dash-theme-toggle" aria-label="Toggle theme" style="margin-bottom: 8px;"></button>
        <a href="#" class="btn btn-ghost" id="logout-btn" style="width: 100%; justify-content: flex-start; gap: 8px;">&#x1F6AA; Logout</a>
      </div>
    </aside>

    <main class="dash-main">
      <div class="dash-header">
        <div style="display: flex; align-items: center; gap: 12px;">
          <button class="dash-mobile-toggle" id="sidebar-toggle">&#9776;</button>
          <h1>Dashboard</h1>
        </div>
        <a href="index.html" class="btn btn-sm btn-outline">View Portfolio</a>
      </div>

      <div id="section-profile" class="dash-content-section">
        <div class="dash-section">
          <h2>Edit Profile</h2>
          <form id="profile-form">
            <div class="dash-form-row">
              <div class="form-group">
                <label for="profile-name">Name</label>
                <input type="text" id="profile-name" name="name" required>
              </div>
              <div class="form-group">
                <label for="profile-role">Role / Title</label>
                <input type="text" id="profile-role" name="role">
              </div>
            </div>
            <div class="form-group">
              <label for="profile-email">Email</label>
              <input type="email" id="profile-email" name="email" required>
            </div>
            <div class="form-group">
              <label for="profile-bio">Bio</label>
              <textarea id="profile-bio" name="bio" rows="4"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>
      </div>

      <div id="section-projects" class="dash-content-section" style="display: none;">
        <div class="dash-section">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);">
            <h2 style="margin: 0; padding: 0; border: 0;">Manage Projects</h2>
            <button class="btn btn-sm btn-primary" id="add-project-btn">+ Add Project</button>
          </div>
          <div id="project-list"></div>
        </div>
      </div>

      <div id="section-data" class="dash-content-section" style="display: none;">
        <div class="dash-section">
          <h2>Export / Import Data</h2>
          <p style="color: var(--text-secondary); margin-bottom: 20px;">
            Back up your portfolio data as JSON or restore from a previous backup.
          </p>
          <div class="export-actions">
            <button class="btn btn-primary" id="export-btn">&#128229; Export JSON</button>
            <label class="file-input-label">
              &#128228; Import JSON
              <input type="file" id="import-input" accept=".json">
            </label>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="project-modal">
    <div class="modal">
      <h2>Add Project</h2>
      <form id="add-project-form">
        <div class="form-group">
          <label for="project-title">Title</label>
          <input type="text" id="project-title" name="title" placeholder="Project name" required>
        </div>
        <div class="form-group">
          <label for="project-desc">Description</label>
          <textarea id="project-desc" name="description" placeholder="What does it do?" rows="3" required></textarea>
        </div>
        <div class="form-group">
          <label for="project-tags">Tags</label>
          <input type="text" id="project-tags" name="tags" placeholder="HTML, CSS, JavaScript">
        </div>
        <div class="form-group">
          <label for="project-icon">Icon (emoji)</label>
          <input type="text" id="project-icon" name="icon" placeholder="&#128187;">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancel-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Project</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
