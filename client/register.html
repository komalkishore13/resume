<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html">KK</a>
      </div>
      <h1>Create account</h1>
      <p class="auth-subtitle">Set up your portfolio dashboard</p>

      <div class="auth-error" id="register-error"></div>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Komal Kishore" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
          <div class="password-strength" id="password-strength">
            <div class="strength-bar">
              <div class="strength-fill" id="strength-fill"></div>
            </div>
            <span class="strength-label" id="strength-label"></span>
          </div>
        </div>
        <button type="submit" class="btn btn-lg btn-primary">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    (function() {
      var saved = localStorage.getItem('portfolio_theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);

      if (Auth.redirectIfAuth()) return;

      var passwordInput = document.getElementById('password');
      var strengthFill = document.getElementById('strength-fill');
      var strengthLabel = document.getElementById('strength-label');

      passwordInput.addEventListener('input', function() {
        var strength = Auth.getPasswordStrength(this.value);
        strengthFill.setAttribute('data-level', strength.score);
        strengthLabel.textContent = this.value ? strength.label : '';
      });

      document.getElementById('register-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var errorEl = document.getElementById('register-error');
        errorEl.classList.remove('visible');

        var name = document.querySelector('[name="name"]').value.trim();
        var email = document.querySelector('[name="email"]').value.trim();
        var password = document.querySelector('[name="password"]').value;

        if (!name || !email || !password) {
          errorEl.textContent = 'All fields are required';
          errorEl.classList.add('visible');
          return;
        }

        if (password.length < 6) {
          errorEl.textContent = 'Password must be at least 6 characters';
          errorEl.classList.add('visible');
          return;
        }

        var result = Auth.register(name, email, password);
        if (result.success) {
          window.location.href = 'dashboard.html';
        } else {
          errorEl.textContent = result.message;
          errorEl.classList.add('visible');
        }
      });
    })();
  </script>
</body>
</html>
